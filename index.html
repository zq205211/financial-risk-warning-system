<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>区域性金融风险穿透预警系统</title>
    <meta name="description" content="多智能体AI+大数据因果推演的区域性地方金融隐性风险穿透预警系统可视化Web应用">
    <meta name="keywords" content="金融风险,预警系统,大数据,因果推演,多智能体,可视化">
    <meta name="author" content="全栈数据开发+金融风控可视化工程师">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">

    <!-- stlite库 -->
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.55.0/build/stlite.min.js"></script>

    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0e1117;
            color: #fafafa;
            overflow-x: hidden;
        }

        /* 加载动画 */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0e1117;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid #1a1d24;
            border-top: 4px solid #2979ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 18px;
            color: #fafafa;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 主容器 */
        #main-container {
            width: 100%;
            min-height: 100vh;
        }

        /* 错误提示 */
        #error-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #1a1d24;
            border: 2px solid #d50000;
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
            text-align: center;
            z-index: 10000;
        }

        #error-message h2 {
            color: #d50000;
            margin-bottom: 15px;
        }

        #error-message p {
            color: #fafafa;
            margin-bottom: 20px;
        }

        #error-message button {
            background-color: #2979ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        #error-message button:hover {
            background-color: #1e5fd9;
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div id="loading">
        <div class="loader"></div>
        <div class="loading-text">🛡️ 正在加载金融风险预警系统...</div>
    </div>

    <!-- 错误提示 -->
    <div id="error-message">
        <h2>⚠️ 加载失败</h2>
        <p>系统加载失败，请刷新页面重试。如果问题持续存在，请检查网络连接或联系技术支持。</p>
        <button onclick="location.reload()">刷新页面</button>
    </div>

    <!-- 主容器 -->
    <div id="main-container"></div>

    <!-- stlite配置 -->
    <script>
        // 错误处理函数
        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-message').style.display = 'block';
        }

        // 加载完成处理函数
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        // 主函数
        async function main() {
            try {
                // 加载app.py文件
                const response = await fetch('./app.py');
                if (!response.ok) {
                    throw new Error('无法加载app.py文件');
                }
                const appCode = await response.text();

                // 初始化stlite
                await stlite.mount(
                    {
                        entrypoint: "app.py",
                        files: {
                            "app.py": appCode
                        },
                        requirements: [
                            "streamlit>=1.28.0",
                            "pandas>=2.0.0",
                            "numpy>=1.24.0",
                            "plotly>=5.18.0",
                            "networkx>=3.1"
                        ]
                    },
                    document.getElementById("main-container")
                );

                // 隐藏加载动画
                hideLoading();

            } catch (error) {
                console.error('加载失败:', error);
                showError();
            }
        }

        // 页面加载完成后执行
        window.addEventListener('DOMContentLoaded', main);
    </script>

    <!-- 性能优化：预加载关键资源 -->
    <link rel="preload" href="./app.py" as="fetch" crossorigin>
</body>
</html>
